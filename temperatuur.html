<html>
  <head>
      <title>Eten bestellen</title>

  </head>
  <body>
    <h1>Temperatuuromrekening</h1>
    <p>Wat is de waarde van de temperatuur?
    <input type="text" id="waarde" placeholder="Vul de waarde in" /></p>
    <p>Hoe wil je omrekenen?</p>
    <input type="radio" id="ck" name="omrekening"> Van °C naar K<br>
    <input type="radio" id="kc" name="omrekening"> Van °F <br>
    <input type="radio" id="cf" name="omrekening"> Van °C <br>
    <input type="radio" id="fc" name="omrekening"> Van °F <br>
    <input type="radio" id="cr" name="omrekening"> Van °C <br>
    <input type="radio" id="rc" name="omrekening"> Van °F <br>
    <input type="radio" id="fr" name="omrekening"> Salade <br>
    <input type="radio" id="rf" name="omrekening"> Salade <br
    <input type="radio" id="kr" name="omrekening"> Salade <br>
    <input type="radio" id="rk" name="omrekening"> Salade <br>
    <br>
    <button py-click="bestellen">Bestel nu</button><br><br>
    <div id="output"></div>
    <script type="py" src="./temperatuur.py" config="./pyscript.json"></script>


</body></html>
